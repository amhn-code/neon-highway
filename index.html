<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Endless Highway</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #050510;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: #fff;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #09091e;
            overflow: hidden;
        }
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #hud-left {
            position: absolute;
            top: 25px;
            left: 25px;
            font-size: 26px;
            font-weight: 900;
            z-index: 10;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            user-select: none;
        }
        #hud-right {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 26px;
            font-weight: 900;
            z-index: 10;
            color: #ff007f;
            text-shadow: 0 0 10px #ff007f;
            user-select: none;
            text-align: right;
            line-height: 1.4;
        }
        .btn-layer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 15;
        }
        .control-btn {
            width: 75px;
            height: 75px;
            background: rgba(13, 13, 38, 0.75);
            border: 3px solid #00ffff;
            color: #00ffff;
            font-size: 32px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px #00ffff;
            user-select: none;
            -webkit-user-select: none;
        }
        .control-btn:active {
            background: #ff007f;
            border-color: #ff007f;
            color: #fff;
            box-shadow: 0 0 25px #ff007f;
        }
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #120024 0%, #050510 50%, #001a24 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            user-select: none;
            border: 8px double #ff007f;
            box-shadow: inset 0 0 50px rgba(255, 0, 127, 0.4), 0 0 30px #ff007f;
        }
        #game-over-screen {
            display: none;
            background: linear-gradient(135deg, #240000 0%, #050510 50%, #1a0024 100%);
            border: 8px double #ff3333;
            box-shadow: inset 0 0 50px rgba(255, 51, 51, 0.4), 0 0 30px #ff3333;
        }
        h1 {
            color: #00ffff;
            font-size: 68px;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
            font-weight: 900;
            letter-spacing: 4px;
        }
        #game-over-screen h1 {
            color: #ff3333;
            text-shadow: 0 0 10px #ff3333, 0 0 20px #ff3333, 0 0 40px #ff3333;
        }
        p {
            font-size: 24px;
            margin-bottom: 20px;
            color: #fff;
            text-align: center;
            line-height: 1.6;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }
        .garage-section {
            margin-bottom: 30px;
            text-align: center;
            z-index: 25;
        }
        .color-picker {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 15px;
        }
        .color-dot {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
            transition: transform 0.2s;
        }
        .color-dot:hover, .color-dot.selected {
            transform: scale(1.25);
            border-color: #00ffff;
            box-shadow: 0 0 25px #00ffff;
        }
        .highlight-pink {
            color: #ff007f;
            text-shadow: 0 0 8px #ff007f;
            font-weight: bold;
        }
        .highlight-yellow {
            color: #ffff00;
            text-shadow: 0 0 8px #ffff00;
            font-weight: bold;
        }
        .menu-btn {
            padding: 18px 45px;
            font-size: 26px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            background: #00ffff;
            color: #050510;
            border: 3px solid #fff;
            cursor: pointer;
            border-radius: 12px;
            box-shadow: 0 0 15px #00ffff, 0 0 30px rgba(0, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud-left">
            Distance: <span id="score-val">0.00</span> mi<br>
            Best: <span id="best-val">0.00</span> mi
        </div>
        <div id="hud-right">
            Speed: <span id="speed-val">0</span> mph<br>
            Fuel: <span id="fuel-val">100</span>%
        </div>
        
        <div class="btn-layer">
            <button class="control-btn" id="btn-left">A</button>
            <button class="control-btn" id="btn-up">W</button>
            <button class="control-btn" id="btn-down">S</button>
            <button class="control-btn" id="btn-right">D</button>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <div id="start-screen" class="overlay-screen">
            <h1>NEON HIGHWAY</h1>
            <p>
                Controls: <span class="highlight-pink">WASD Keys</span><br>
                <span class="highlight-pink">S</span> slows down (pauses score & fuel)<br>
                Refuel at Gas Stations every <span class="highlight-yellow">5 Miles!</span>
            </p>
            
            <div class="garage-section">
                <p>CHOOSE YOUR RACER COLOR:</p>
                <div class="color-picker">
                    <div class="color-dot selected" data-color="#00ffff" style="background: #00ffff;"></div>
                    <div class="color-dot" data-color="#ff007f" style="background: #ff007f;"></div>
                    <div class="color-dot" data-color="#ffff00" style="background: #ffff00;"></div>
                    <div class="color-dot" data-color="#33ff33" style="background: #33ff33;"></div>
                    <div class="color-dot" data-color="#ffffff" style="background: #ffffff;"></div>
                </div>
            </div>

            <button class="menu-btn" id="start-btn">Start Engine</button>
        </div>

        <div id="game-over-screen" class="overlay-screen">
            <h1 id="fail-title">CRASHED!</h1>
            <p>Your Distance: <span id="final-score-val" class="highlight-yellow">0.00</span> mi</p>
            <p>Personal Best: <span id="pb-score-val" class="highlight-pink">0.00</span> mi</p>
            <button class="menu-btn" id="restart-btn">Drive Again</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('score-val');
    const bestVal = document.getElementById('best-val');
    const speedVal = document.getElementById('speed-val');
    const fuelVal = document.getElementById('fuel-val');
    const finalScoreVal = document.getElementById('final-score-val');
    const pbScoreVal = document.getElementById('pb-score-val');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const failTitle = document.getElementById('fail-title');

    let WIDTH = window.innerWidth;
    let HEIGHT = window.innerHeight;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    const CAR_WIDTH = 40;
    const CAR_HEIGHT = 70;
    const HIT_WIDTH = 14; 
    const HIT_HEIGHT = 28;

    let gameActive = false;
    let distanceMiles = 0;
    
    let gameSpeed = 0; 
    let targetSpeed = 0;
    let currentMPH = 0;

    let keys = {};
    let roadCurve = 0;       
    let targetCurve = 0;     
    let curveTimer = 0;      
    let segmentOffset = 0;   

    let player = {
        x: WIDTH / 2 - CAR_WIDTH / 2,
        y: HEIGHT - CAR_HEIGHT - 150,
        speed: 8,
        color: "#00ffff" 
    };

    let fuelPercent = 100;
    let nextStationMile = 5;
    let obstacles = [];
    let spawnTimer = 0;
    let stationActive = null;

    let treePositions = [];

    // INSTANT RUNNING INTERACTION RULES (No delayed parent checks)
    const colorDots = document.querySelectorAll('.color-dot');
    colorDots.forEach(dot => {
        dot.addEventListener('click', (e) => {
            colorDots.forEach(d => d.classList.remove('selected'));
            e.target.classList.add('selected');
            player.color = e.target.getAttribute('data-color');
        });
    });

    let localHighScore = localStorage.getItem('neonHighwayHighScore') || 0;
    if(bestVal) bestVal.innerText = parseFloat(localHighScore).toFixed(2);

    function initScenery() {
        treePositions = [];
        for (let i = 0; i < 15; i++) {
            treePositions.push({
y: (i * (HEIGHT / 10)) - 100,side: Math.random() < 0.5 ? -1 : 1});}}initScenery();window.addEventListener('resize', () => {WIDTH = window.innerWidth;HEIGHT = window.innerHeight;canvas.width = WIDTH;canvas.height = HEIGHT;initScenery();});window.addEventListener('keydown', (e) => { if (e.key) keys[e.key.toLowerCase()] = true; });window.addEventListener('keyup', (e) => { if (e.key) keys[e.key.toLowerCase()] = false; });function setupBtn(id, keyStr) {const btn = document.getElementById(id);if (!btn) return;btn.addEventListener('mousedown', () => { keys[keyStr] = true; });btn.addEventListener('mouseup', () => { keys[keyStr] = false; });btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyStr] = true; });btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyStr] = false; });}setupBtn('btn-left', 'a');setupBtn('btn-right', 'd');setupBtn('btn-up', 'w');setupBtn('btn-down', 's');document.getElementById('start-btn').addEventListener('click', () => {if(startScreen) startScreen.style.display = 'none';gameActive = true;targetSpeed = 6;gameSpeed = 6;gameLoop();});document.getElementById('restart-btn').addEventListener('click', () => {resetGame();});function getRoadCenterAt(y) {let perspectiveFactor = ((HEIGHT - y) / HEIGHT);let curveX = Math.sin(perspectiveFactor * Math.PI * 0.5) * roadCurve * 120;return (WIDTH / 2) + curveX;}function drawCar(x, y, color, isPlayer) {ctx.fillStyle = color;ctx.fillRect(x, y, CAR_WIDTH, CAR_HEIGHT);ctx.fillStyle = "#ffffff";ctx.fillRect(x + 5, y + 15, CAR_WIDTH - 10, 12);ctx.fillStyle = isPlayer ? "#ff3333" : "#ffff00";let lightY = isPlayer ? y + CAR_HEIGHT - 6 : y;ctx.fillRect(x + 4, lightY, 8, 6);ctx.fillRect(x + CAR_WIDTH - 12, lightY, 8, 6);}function drawStation(x, y) {ctx.fillStyle = "#33ff33";ctx.fillRect(x, y, 50, 60);ctx.fillStyle = "#ffffff";ctx.font = "20px monospace";ctx.fillText("GAS", x + 25, y + 35);}function drawScenery(currentRoadWidth) {treePositions.forEach(tree => {tree.y += gameSpeed;if (tree.y > HEIGHT + 50) {tree.y = -100;tree.side = Math.random() < 0.5 ? -1 : 1;}let roadCenter = getRoadCenterAt(tree.y);let treeX = (tree.side === -1) ? (roadCenter - (currentRoadWidth / 2) - 50) : (roadCenter + (currentRoadWidth / 2) + 20);ctx.fillStyle = "#5c4033";ctx.fillRect(treeX + 12, tree.y + 30, 6, 20);ctx.fillStyle = "#1e4d2b";ctx.beginPath();ctx.arc(treeX + 15, tree.y + 20, 20, 0, Math.PI * 2);ctx.fill();});}function gameLoop() {if (!gameActive) return;curveTimer++;if (curveTimer > 120) {targetCurve = (Math.random() - 0.5) * 4;curveTimer = 0;}roadCurve += (targetCurve - roadCurve) * 0.02;if (!keys['s']) distanceMiles += (gameSpeed * 0.0001);if(scoreVal) scoreVal.innerText = distanceMiles.toFixed(2);if (keys['s']) {targetSpeed = 3;} else if (keys['w']) {targetSpeed = distanceMiles > 0.5 ? 13 : 9;} else {targetSpeed = distanceMiles > 0.5 ? 10 : 6;}gameSpeed += (targetSpeed - gameSpeed) * 0.05;let calculatedMPH = Math.floor(gameSpeed * 14.5);currentMPH += (calculatedMPH - currentMPH) * 0.1;if(speedVal) speedVal.innerText = Math.floor(currentMPH);if (!keys['s']) fuelPercent -= (gameSpeed * 0.001);if (fuelPercent < 0) fuelPercent = 0;if(fuelVal) fuelVal.innerText = Math.ceil(fuelPercent);if (fuelPercent <= 0) { endGame("OUT OF FUEL!"); return; }if (keys['a']) player.x -= player.speed;if (keys['d']) player.x += player.speed;if (keys['w'] && player.y > HEIGHT * 0.2) player.y -= (player.speed - 2);if (keys['s'] && player.y < HEIGHT - CAR_HEIGHT - 140) player.y += player.speed;let playerRoadCenter = getRoadCenterAt(player.y);let roadWidthAtPlayer = Math.min(600, WIDTH * 0.6);let playerLeftBound = playerRoadCenter - roadWidthAtPlayer / 2 + 20;let playerRightBound = playerRoadCenter + roadWidthAtPlayer / 2 - CAR_WIDTH - 20;if (player.x < playerLeftBound) player.x = playerLeftBound;if (player.x > playerRightBound) player.x = playerRightBound;segmentOffset += gameSpeed;if (segmentOffset >= 60) segmentOffset = 0;ctx.clearRect(0, 0, WIDTH, HEIGHT);ctx.fillStyle = '#0f3817';ctx.fillRect(0, 0, WIDTH, HEIGHT);let currentRoadWidth = Math.min(600, WIDTH * 0.6);for (let y = 0; y < HEIGHT; y += 6) {let centerX = getRoadCenterAt(y);ctx.fillStyle = '#0d0d26';ctx.fillRect(centerX - currentRoadWidth / 2, y, currentRoadWidth, 6);ctx.fillStyle = '#ff007f';ctx.fillRect(centerX - currentRoadWidth / 2, y, 6, 6);ctx.fillStyle = '#00ffff';ctx.fillRect(centerX + currentRoadWidth / 2 - 6, y, 6, 6);if ((y + segmentOffset) % 60 < 30) {ctx.fillStyle = '#ffff00';ctx.fillRect(centerX - 3, y, 6, 6);}}drawScenery(currentRoadWidth);if (distanceMiles >= nextStationMile - 0.1 && !stationActive) {stationActive = { y: -120, laneOffset: -(currentRoadWidth / 2) - 65 };}if (stationActive) {stationActive.y += gameSpeed;let stationX = getRoadCenterAt(stationActive.y) + stationActive.laneOffset;drawStation(stationX, stationActive.y);if (stationActive.y > player.y - 120 && stationActive.y < player.y + 120) {fuelPercent = 100;nextStationMile += 5;}if (stationActive.y > HEIGHT + 150) stationActive = null;}drawCar(player.x, player.y, player.color, true);spawnTimer += gameSpeed;if (spawnTimer > 220) { spawnObstacle(); spawnTimer = 0; }for (let i = obstacles.length - 1; i >= 0; i--) {let obs = obstacles[i];obs.y += gameSpeed + 1.5;obs.x = getRoadCenterAt(obs.y) + obs.laneOffset - CAR_WIDTH / 2;drawCar(obs.x, obs.y, "#ff3333", false);if (obs.y > HEIGHT + 100 || obs.y < -150) { obstacles.splice(i, 1); continue; }if (Math.abs((player.x + CAR_WIDTH/2) - (obs.x + CAR_WIDTH/2)) < HIT_WIDTH &&Math.abs((player.y + CAR_HEIGHT/2) - (obs.y + CAR_HEIGHT/2)) < HIT_HEIGHT) {endGame("CRASHED!");return;}}requestAnimationFrame(gameLoop);}function spawnObstacle() {if (!gameActive) return;let roadWidthAtTop = Math.min(600, WIDTH * 0.6);let maxOffset = (roadWidthAtTop / 2) - 40;let randomLaneOffset = (Math.random() * maxOffset * 2) - maxOffset;obstacles.push({ x: 0, y: -CAR_HEIGHT, laneOffset: randomLaneOffset });}function endGame(reason) {gameActive = false;if(failTitle) failTitle.innerText = reason;if(finalScoreVal) finalScoreVal.innerText = distanceMiles.toFixed(2);if (distanceMiles > localHighScore) {localHighScore = distanceMiles;localStorage.setItem('neonHighwayHighScore', distanceMiles);if(bestVal) bestVal.innerText = distanceMiles.toFixed(2);}if(pbScoreVal) pbScoreVal.innerText = parseFloat(localHighScore).toFixed(2);if(gameOverScreen) gameOverScreen.style.display = 'flex';}function resetGame() {obstacles = [];stationActive = null;WIDTH = window.innerWidth;HEIGHT = window.innerHeight;player.x = WIDTH / 2 - CAR_WIDTH / 2;player.y = HEIGHT - CAR_HEIGHT - 150;distanceMiles = 0;fuelPercent = 100;nextStationMile = 5;gameSpeed = 6;targetSpeed = 6;currentMPH = 0;roadCurve = 0;targetCurve = 0;curveTimer = 0;initScenery();if(gameOverScreen) gameOverScreen.style.display = 'none';gameActive = true;gameLoop();}
